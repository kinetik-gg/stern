name: Bug
description: Report incorrect behavior, regression, or broken tooling.
title: "fix(scope): "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, tests, input events, or minimal code where possible.
      placeholder: "cargo test -p kinetik-ui-core widget_id"
    validations:
      required: true

  - type: textarea
    id: spec
    attributes:
      label: Relevant Spec Sections
      description: Link or list sections from docs/specs.md, if applicable.

  - type: textarea
    id: tests
    attributes:
      label: Tests To Add Or Update
      description: What regression test should cover this?

